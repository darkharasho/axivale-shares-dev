<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- AxiVale mark: serif "A." — A in the Axi ink (cream), dot in the Vale accent (coral),
       on the newspaper's dark paper tile. Mirrors the masthead wordmark split. -->
  <rect width="64" height="64" rx="13" fill="#16171a"/>
  <text x="30" y="48" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="900" font-size="46" letter-spacing="-1">
    <tspan fill="#e4e3dc">A</tspan><tspan fill="#e05a50">.</tspan>
  </text>
</svg>
